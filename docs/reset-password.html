<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing Mint - 重置密码</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e0f7ef 0%, #b2dfdb 100%);
            color: #333;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            text-align: center;
        }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 22px; margin-bottom: 12px; color: #1a1a1a; }
        p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: 500; }
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus { border-color: #4dc9a0; }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px 32px;
            background: linear-gradient(135deg, #4dc9a0, #36b389);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s;
            margin-top: 8px;
        }
        .btn:hover { transform: scale(1.03); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .status { margin-top: 16px; font-size: 14px; }
        .error { color: #e53935; }
        .success { color: #4dc9a0; }
        .hint { font-size: 13px; color: #999; margin-top: 6px; }
        .open-app {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 32px;
            background: linear-gradient(135deg, #4dc9a0, #36b389);
            color: #fff;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
        }
        #form-section, #result-section { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <!-- 加载状态 -->
        <div id="loading-section">
            <div class="icon">&#9203;</div>
            <h1>正在验证链接...</h1>
            <p>请稍候。</p>
        </div>

        <!-- 密码表单 -->
        <div id="form-section">
            <div class="icon">&#128274;</div>
            <h1>重置密码</h1>
            <p>请输入新密码。</p>
            <div class="form-group">
                <label for="password">新密码</label>
                <input type="password" id="password" placeholder="至少 6 位" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirm">确认密码</label>
                <input type="password" id="confirm" placeholder="再次输入新密码" autocomplete="new-password">
            </div>
            <button class="btn" id="submit-btn" onclick="resetPassword()">确认修改</button>
            <div class="status" id="form-status"></div>
        </div>

        <!-- 结果 -->
        <div id="result-section">
            <div class="icon" id="result-icon"></div>
            <h1 id="result-title"></h1>
            <p id="result-message"></p>
            <a class="open-app" id="open-app" style="display:none;" href="clothingmint://auth/password-reset">打开 App 登录</a>
            <div class="status" id="result-hint"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://wyqzgryuxyfrsenyupls.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5cXpncnl1eHlmcnNlbnl1cGxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc5ODg1NzIsImV4cCI6MjA1MzU2NDU3Mn0.fZSF9D7ihMHdqhOtDiWA14F2VghrMVpcekNOxe3Nvls';

        let supabaseClient;

        async function init() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');
            const refreshToken = params.get('refresh_token');
            const type = params.get('type');

            if (!accessToken || type !== 'recovery') {
                showResult('\u274C', '无效的重置链接', '链接无效或已过期，请重新发起密码重置。');
                return;
            }

            try {
                const { createClient } = supabase;
                supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { error } = await supabaseClient.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken
                });
                if (error) throw error;

                // 链接有效，显示密码表单
                document.getElementById('loading-section').style.display = 'none';
                document.getElementById('form-section').style.display = 'block';
            } catch (err) {
                showResult('\u274C', '链接已过期', err.message || '请重新发起密码重置。');
            }
        }

        async function resetPassword() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const btn = document.getElementById('submit-btn');
            const formStatus = document.getElementById('form-status');

            formStatus.textContent = '';
            formStatus.className = 'status';

            if (password.length < 6) {
                formStatus.textContent = '密码至少 6 位';
                formStatus.className = 'status error';
                return;
            }
            if (password !== confirm) {
                formStatus.textContent = '两次密码不一致';
                formStatus.className = 'status error';
                return;
            }

            btn.disabled = true;
            btn.textContent = '提交中...';

            try {
                const { error } = await supabaseClient.auth.updateUser({ password });
                if (error) throw error;

                showResult('\u2705', '密码修改成功!', '您可以使用新密码登录 Clothing Mint 了。', true);
            } catch (err) {
                btn.disabled = false;
                btn.textContent = '确认修改';
                formStatus.textContent = err.message || '修改失败，请重试';
                formStatus.className = 'status error';
            }
        }

        function showResult(iconText, titleText, msg, showApp) {
            document.getElementById('loading-section').style.display = 'none';
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('result-icon').textContent = iconText;
            document.getElementById('result-title').textContent = titleText;
            document.getElementById('result-message').textContent = msg;
            if (showApp) {
                document.getElementById('open-app').style.display = 'inline-block';
                document.getElementById('result-hint').textContent = '如果 App 没有自动打开，请手动打开 Clothing Mint 并登录。';
                document.getElementById('result-hint').className = 'status success';
            }
        }

        // 回车提交
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.getElementById('form-section').style.display === 'block') {
                resetPassword();
            }
        });

        init();
    </script>
</body>
</html>
