name: Build iOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "Clothing Mint.xcodeproj" \
            -scheme "Clothing Mint"

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project "Clothing Mint.xcodeproj" \
            -scheme "Clothing Mint" \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test-without-building \
            -project "Clothing Mint.xcodeproj" \
            -scheme "Clothing Mint" \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO || true

      - name: Build for archive
        run: |
          xcodebuild archive \
            -project "Clothing Mint.xcodeproj" \
            -scheme "Clothing Mint" \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/ClothingMint.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p $RUNNER_TEMP/export
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ClothingMint.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates || true
          # If export fails (no signing), create IPA from archive directly
          if [ ! -f "$RUNNER_TEMP/export/Clothing Mint.ipa" ]; then
            cd $RUNNER_TEMP/ClothingMint.xcarchive/Products/Applications
            mkdir -p Payload
            cp -r "Clothing Mint.app" Payload/
            zip -r "$RUNNER_TEMP/export/ClothingMint.ipa" Payload
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClothingMint-${{ github.ref_name }}
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: warn
